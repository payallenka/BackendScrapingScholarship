# fly.toml — generated for Fly.io free tier deployment
app = "scholarship-scraper"
primary_region = "iad"

[build]

[env]
  PYTHONPATH = "/app"
  PLAYWRIGHT_BROWSERS_PATH = "/ms-playwright"
  DB_PATH = "/data/scholarships.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "scholarship_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
